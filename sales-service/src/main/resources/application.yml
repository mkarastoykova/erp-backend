server:
  port: 8087
  servlet:
    context-path: /

spring:
  application:
    name: sales-service

  datasource:
    url: jdbc:postgresql://localhost:5432/erp_sales
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.erp.sales: DEBUG
    org.springframework.web: INFO

